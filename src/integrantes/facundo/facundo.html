<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOMBRE - Perfil</title>
    <link rel="stylesheet" href="../../css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <h2 class="logo">IFTS - Frontend</h2>
        <ul class="nav-links">
          <li><a href="../../index.html">Inicio</a></li>
          <li><a href="../../bitacora/bitacora.html">Bitácora</a></li>
        </ul>
      </div>
    </nav>

    <div class="profile-container">
      <div class="container">
        <div class="back-navigation">
          <a href="../../index.html" class="btn-back">← Volver al equipo</a>
        </div>

        <div class="profile-card">
          <div class="profile-header">
            <img
              src="../../img/rodrigo.jpg"
              alt="Foto de Rodrigo"
              class="profile-photo"
              id="profilePhoto"
            />
            <div class="profile-info-header">
              <h1 class="profile-name">NOMBRE</h1>
              <p class="profile-location">📍 UBICACION</p>
              <p class="profile-age">🎂 99 años</p>
            </div>
          </div>

          <div class="profile-section">
            <h2>Habilidades</h2>
            <div class="skills-container">
              <span class="skill-tag">A</span>
              <span class="skill-tag">B</span>
              <span class="skill-tag">C</span>
              <span class="skill-tag">D</span>
              <span class="skill-tag">E</span>
              <span class="skill-tag">F</span>
            </div>
            <button id="toggleSkillsBtn" class="btn-interactive">
              Mostrar más detalles
            </button>
            <div id="skillsDetails" class="hidden details-box">
              <p>💪 Algo</p>
              <p>📚 Algo más</p>
              <p>🎯 Algo más+</p>
            </div>
          </div>

          <div class="profile-section">
            <h2>Películas Favoritas</h2>
            <ul class="favorites-list">
              <li>🎬 A</li>
              <li>🎬 B</li>
              <li>🎬 C</li>
              <li>🎬 D</li>
            </ul>
          </div>

          <div class="profile-section">
            <h2>Discos Musicales Favoritos</h2>
            <ul class="favorites-list">
              <li>🎵 A</li>
              <li>🎵 B</li>
              <li>🎵 C</li>
              <li>🎵 D</li>
            </ul>
          </div>
        </div>

        <div class="navigation-buttons">
          <a href="../../index.html" class="btn-nav btn-home">🏠 Inicio</a>
        </div>
      </div>
    </div>

    <script src="../individual.js"></script>
  </body>
</html>
